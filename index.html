<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📢 AX·신기술 주간 행사 브리핑</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
      padding: 20px;
    }

    .wrapper {
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── 헤더 ── */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
      color: white;
      text-align: center;
    }
    .header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 6px; }
    .header p  { font-size: 0.95rem; opacity: 0.85; }

    /* ── 카드 ── */
    .card {
      background: white;
      border-radius: 14px;
      padding: 28px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .card h3 {
      font-size: 1rem;
      color: #4a5568;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── 폼 ── */
    .form-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 180px; }
    label { font-size: 0.85rem; font-weight: 600; color: #4a5568; }
    input[type="date"],
    input[type="password"],
    input[type="text"] {
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    input:focus { border-color: #667eea; }

    /* ── 버튼 ── */
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .btn-primary:hover   { opacity: 0.92; transform: translateY(-1px); }
    .btn-primary:active  { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-copy {
      background: #edf2f7;
      color: #4a5568;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      float: right;
      margin-bottom: 12px;
      transition: background 0.2s;
    }
    .btn-copy:hover { background: #e2e8f0; }

    /* ── API 키 설정 패널 ── */
    #apiPanel { border-left: 4px solid #667eea; }
    .key-saved {
      font-size: 0.82rem;
      color: #48bb78;
      margin-top: 4px;
      font-weight: 600;
    }
    .key-hint { font-size: 0.78rem; color: #a0aec0; margin-top: 4px; }

    /* ── 로딩 ── */
    #loading { text-align: center; padding: 48px 0; display: none; }
    .spinner {
      width: 48px; height: 48px;
      border: 5px solid #e2e8f0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #4a5568; font-size: 0.95rem; }
    .loading-steps { font-size: 0.82rem; color: #a0aec0; margin-top: 8px; }

    /* ── 결과 ── */
    #resultCard { display: none; }
    #resultCard::after { content: ''; display: table; clear: both; }
    .result-content {
      line-height: 1.85;
      font-size: 0.95rem;
    }
    .result-content h1,
    .result-content h2,
    .result-content h3 {
      color: #2d3748;
      margin: 20px 0 10px;
    }
    .result-content strong { color: #2d3748; }
    .result-content a { color: #667eea; text-decoration: none; }
    .result-content a:hover { text-decoration: underline; }
    .result-content hr {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 20px 0;
    }
    .result-content blockquote {
      border-left: 4px solid #667eea;
      padding-left: 16px;
      color: #4a5568;
      margin: 12px 0;
    }
    .result-content pre {
      background: #f7fafc;
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      font-size: 0.88rem;
    }
    .result-content ul, .result-content ol {
      padding-left: 20px;
      margin: 8px 0;
    }
    .result-content li { margin: 4px 0; }

    /* ── 이모지 타이틀 (💡 추천 사유, 🔗 사전등록, ■ 행사명 등) ── */
    .result-content .emoji-title {
      display: block;
      font-weight: 700;
      font-size: 1rem;
      color: #2d3748;
      margin-top: 18px;
      margin-bottom: 2px;
      line-height: 1.5;
    }
    .result-content .emoji-title-link {
      display: block;
      font-weight: 700;
      font-size: 0.95rem;
      color: #667eea;
      margin-top: 14px;
      margin-bottom: 2px;
      line-height: 1.5;
    }

    /* ── 에러 ── */
    .error-box {
      background: #fff5f5;
      border: 2px solid #feb2b2;
      border-radius: 10px;
      padding: 16px 20px;
      color: #c53030;
      font-size: 0.9rem;
      margin-top: 16px;
      display: none;
    }

    /* ── 히스토리 패널 ── */
    #historyPanel { display: none; }
    .history-empty {
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 20px 0;
    }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f7fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      gap: 12px;
    }
    .history-item:hover { border-color: #667eea; background: #ebf4ff; }
    .history-item-info { flex: 1; min-width: 0; }
    .history-item-title {
      font-weight: 700;
      font-size: 0.9rem;
      color: #2d3748;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-item-date {
      font-size: 0.78rem;
      color: #a0aec0;
      margin-top: 2px;
    }
    .history-item-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-hist-dl {
      background: #edf2f7;
      border: none;
      border-radius: 7px;
      padding: 5px 10px;
      font-size: 0.78rem;
      cursor: pointer;
      color: #4a5568;
      font-weight: 600;
      transition: background 0.15s;
    }
    .btn-hist-dl:hover  { background: #e2e8f0; }
    .btn-hist-del {
      background: #fff5f5;
      border: none;
      border-radius: 7px;
      padding: 5px 10px;
      font-size: 0.78rem;
      cursor: pointer;
      color: #c53030;
      font-weight: 600;
      transition: background 0.15s;
    }
    .btn-hist-del:hover { background: #fed7d7; }

    /* ── 배지 ── */
    .badge {
      display: inline-block;
      background: #ebf4ff;
      color: #3182ce;
      border-radius: 99px;
      padding: 2px 10px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-left: 8px;
    }

    @media (max-width: 600px) {
      .header h1 { font-size: 1.4rem; }
      .form-row { flex-direction: column; }
      .btn-primary { width: 100%; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- 헤더 -->
  <div class="header">
    <h1>📢 신기술 주간 행사 브리핑</h1>
    <p>AI · AX · 블록체인 · 클라우드 · 보안 등 주요 신기술 관련 국내 행사를 수집하고 브리핑을 생성합니다</p>
  </div>

  <!-- API 키 설정 -->
  <div class="card" id="apiPanel">
    <h3>⚙️ API 키 설정 <span class="badge">최초 1회</span></h3>
    <div class="form-row">
      <div class="form-group">
        <label>Anthropic API Key</label>
        <input type="password" id="anthropicKey" placeholder="sk-ant-api..." />
        <span class="key-hint">console.anthropic.com → API Keys에서 발급</span>
      </div>
      <div class="form-group">
        <label>Serper API Key (웹검색용)</label>
        <input type="password" id="serperKey" placeholder="serper.dev API 키" />
        <span class="key-hint">serper.dev → Dashboard에서 발급 (무료 2,500회/월)</span>
      </div>
      <button class="btn-primary" onclick="saveKeys()" style="height:42px; align-self:flex-end;">
        💾 저장
      </button>
    </div>
    <div class="key-saved" id="keySavedMsg" style="display:none;">✅ API 키가 브라우저에 저장되었습니다.</div>
  </div>

  <!-- 실행 패널 -->
  <div class="card">
    <h3>🚀 브리핑 생성</h3>
    <div class="form-row">
      <div class="form-group">
        <label>기준 날짜 (비워두면 오늘)</label>
        <input type="date" id="dateInput" />
      </div>
      <button class="btn-primary" id="runBtn" onclick="runBriefing()">
        📢 브리핑 생성하기
      </button>
    </div>
    <div class="error-box" id="errorBox"></div>
  </div>

  <!-- 로딩 -->
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">브리핑을 생성하고 있습니다...</div>
    <div class="loading-steps" id="loadingStep">웹 검색 중...</div>
  </div>

  <!-- 히스토리 -->
  <div class="card" id="historyPanel">
    <h3>📂 지난 브리핑 <span class="badge" id="historyCount">0</span></h3>
    <div id="historyList" class="history-list">
      <p class="history-empty">아직 저장된 브리핑이 없습니다.</p>
    </div>
  </div>

  <!-- 결과 -->
  <div class="card" id="resultCard">
    <button class="btn-copy" onclick="downloadResult()">⬇️ 파일 저장</button>
    <button class="btn-copy" onclick="copyResult()" style="margin-right:6px;">📋 전체 복사</button>
    <div class="result-content" id="resultContent"></div>
  </div>

</div>

<script>
  // ── marked.js: 링크 새 창으로 열기 ──
  const renderer = new marked.Renderer();
  renderer.link = function(href, title, text) {
    const titleAttr = title ? ` title="${title}"` : '';
    return `<a href="${href}"${titleAttr} target="_blank" rel="noopener noreferrer">${text}</a>`;
  };
  marked.use({ renderer });

  // ── 브리핑 HTML 렌더링 + 이모지 타이틀 후처리 ──
  function renderBriefing(text) {
    const html = marked.parse(text);
    const div  = document.createElement('div');
    div.innerHTML = html;

    div.querySelectorAll('p').forEach(p => {
      const t = p.textContent.trim();
      if (t.startsWith('🔗')) {
        p.classList.add('emoji-title-link');
      } else if (
        t.startsWith('💡') ||
        t.startsWith('■')  ||
        t.startsWith('📌') ||
        t.startsWith('📍') ||
        t.startsWith('🌐')
      ) {
        p.classList.add('emoji-title');
      }
    });

    return div.innerHTML;
  }

  // ── 날짜 기본값: 오늘 ──
  document.getElementById('dateInput').valueAsDate = new Date();

  // ── 저장된 키 불러오기 ──
  window.addEventListener('load', () => {
    const ak = localStorage.getItem('ax_anthropic_key');
    const sk = localStorage.getItem('ax_serper_key');
    if (ak) document.getElementById('anthropicKey').value = ak;
    if (sk) document.getElementById('serperKey').value = sk;
    if (ak && sk) document.getElementById('keySavedMsg').style.display = 'block';
    // 히스토리 복원은 아래 별도 listener에서 처리
  });

  // ── 히스토리 관리 ──
  const HISTORY_KEY = 'ax_briefing_history';
  const MAX_HISTORY = 20;

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
    catch { return []; }
  }

  function saveToHistory(date, text) {
    const history = loadHistory();
    // 첫 줄에서 제목 추출
    const titleMatch = text.match(/\[📢[^\]]+\]/);
    const title = titleMatch ? titleMatch[0] : `브리핑 (${date})`;
    const item = {
      id: Date.now().toString(),
      date,
      title,
      text,
      savedAt: new Date().toLocaleString('ko-KR')
    };
    history.unshift(item);
    if (history.length > MAX_HISTORY) history.pop();
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    renderHistoryPanel();
  }

  function deleteFromHistory(id) {
    const history = loadHistory().filter(h => h.id !== id);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    renderHistoryPanel();
  }

  function renderHistoryPanel() {
    const history = loadHistory();
    const panel   = document.getElementById('historyPanel');
    const list    = document.getElementById('historyList');
    const badge   = document.getElementById('historyCount');

    badge.textContent = history.length;
    panel.style.display = 'block';

    if (history.length === 0) {
      list.innerHTML = '<p class="history-empty">아직 저장된 브리핑이 없습니다.</p>';
      return;
    }

    list.innerHTML = history.map(h => `
      <div class="history-item" onclick="viewHistory('${h.id}')">
        <div class="history-item-info">
          <div class="history-item-title">${h.title}</div>
          <div class="history-item-date">기준일: ${h.date} &nbsp;·&nbsp; 저장: ${h.savedAt}</div>
        </div>
        <div class="history-item-actions" onclick="event.stopPropagation()">
          <button class="btn-hist-dl" onclick="downloadHistory('${h.id}')">⬇️ 저장</button>
          <button class="btn-hist-del" onclick="deleteHistory('${h.id}')">🗑 삭제</button>
        </div>
      </div>
    `).join('');
  }

  function viewHistory(id) {
    const item = loadHistory().find(h => h.id === id);
    if (!item) return;
    document.getElementById('resultContent').innerHTML = renderBriefing(item.text);
    document.getElementById('resultCard').style.display = 'block';
    document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
    // 현재 보고 있는 항목 기억 (다운로드 시 사용)
    window._currentBriefingText = item.text;
    window._currentBriefingDate = item.date;
  }

  function downloadHistory(id) {
    const item = loadHistory().find(h => h.id === id);
    if (item) triggerDownload(item.text, item.date);
  }

  function deleteHistory(id) {
    if (confirm('이 브리핑을 삭제할까요?')) deleteFromHistory(id);
  }

  function triggerDownload(text, date) {
    const blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `신기술브리핑_${date}.md`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // ── API 키 저장 ──
  function saveKeys() {
    const ak = document.getElementById('anthropicKey').value.trim();
    const sk = document.getElementById('serperKey').value.trim();
    if (!ak) { alert('Anthropic API 키를 입력해 주세요.'); return; }
    if (!sk) { alert('Serper API 키를 입력해 주세요.'); return; }
    localStorage.setItem('ax_anthropic_key', ak);
    localStorage.setItem('ax_serper_key', sk);
    document.getElementById('keySavedMsg').style.display = 'block';
  }

  // ── 브리핑 생성 ──
  async function runBriefing() {
    const anthropicKey = localStorage.getItem('ax_anthropic_key');
    const serperKey    = localStorage.getItem('ax_serper_key');

    if (!anthropicKey || !serperKey) {
      showError('API 키를 먼저 저장해 주세요 (위의 설정 패널에서 입력 후 저장 버튼 클릭).');
      return;
    }

    const date = document.getElementById('dateInput').value || new Date().toISOString().split('T')[0];

    // UI 상태
    document.getElementById('runBtn').disabled = true;
    document.getElementById('loading').style.display  = 'block';
    document.getElementById('resultCard').style.display = 'none';
    document.getElementById('errorBox').style.display  = 'none';

    setLoadingStep('🔍 구글 웹 검색 중...');

    try {
      // 1. 웹 검색
      const searchResults = await searchWeb(serperKey, date);
      setLoadingStep('🤖 Claude AI가 브리핑을 작성 중...');

      // 2. Claude 브리핑 생성
      const briefing = await generateBriefing(anthropicKey, date, searchResults);

      // 3. 결과 표시 + 자동 저장
      document.getElementById('loading').style.display   = 'none';
      document.getElementById('resultContent').innerHTML = renderBriefing(briefing);
      document.getElementById('resultCard').style.display = 'block';
      window._currentBriefingText = briefing;
      window._currentBriefingDate = date;
      saveToHistory(date, briefing);

    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      showError('오류: ' + e.message);
    } finally {
      document.getElementById('runBtn').disabled = false;
    }
  }

  function setLoadingStep(msg) {
    document.getElementById('loadingStep').textContent = msg;
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = '⚠️ ' + msg;
    box.style.display = 'block';
  }

  // ── Serper 웹 검색 ──
  async function searchWeb(apiKey, date) {
    const d     = new Date(date);
    const month = d.getMonth() + 1;
    const year  = d.getFullYear();

    const queries = [
      // AI / AX
      `AI 세미나 ${month}월 ${year}년 신청`,
      `AX 컨퍼런스 ${month}월 ${year}년`,
      `생성AI 교육 세미나 ${month}월 ${year}년`,
      `LLM 워크숍 ${month}월 ${year}년`,
      `AI conference Korea ${month} ${year}`,
      // 블록체인 / Web3
      `블록체인 컨퍼런스 세미나 ${month}월 ${year}년`,
      `Web3 NFT 크립토 행사 Korea ${month} ${year}`,
      // 클라우드 / 인프라
      `클라우드 컨퍼런스 세미나 ${month}월 ${year}년`,
      `AWS Azure GCP 클라우드 행사 ${month}월 ${year}년`,
      // 보안 / 사이버
      `사이버보안 정보보안 컨퍼런스 ${month}월 ${year}년`,
      // 핀테크 / 디지털전환
      `핀테크 컨퍼런스 ${month}월 ${year}년`,
      `디지털전환 DX 세미나 ${month}월 ${year}년`,
      // 기타 신기술
      `IoT 메타버스 XR 신기술 세미나 ${month}월 ${year}년`,
      `신기술 컨퍼런스 국내 ${month}월 ${year}년`,
    ];

    const allResults = [];

    for (const q of queries) {
      try {
        const res = await fetch('https://google.serper.dev/search', {
          method: 'POST',
          headers: { 'X-API-KEY': apiKey, 'Content-Type': 'application/json' },
          body: JSON.stringify({ q, gl: 'kr', hl: 'ko', num: 5 }),
        });
        const data = await res.json();
        if (data.organic) {
          for (const r of data.organic) {
            allResults.push(`제목: ${r.title}\n요약: ${r.snippet}\nURL: ${r.link}`);
          }
        }
      } catch (_) { /* 개별 쿼리 실패 무시 */ }
    }

    return allResults.length > 0
      ? allResults.join('\n\n---\n\n')
      : '검색 결과를 가져오지 못했습니다.';
  }

  // ── Claude 브리핑 생성 ──
  async function generateBriefing(apiKey, date, searchResults) {
    const d       = new Date(date);
    const month   = d.getMonth() + 1;
    const day     = d.getDate();
    const endDate = new Date(d);
    endDate.setDate(d.getDate() + 20);

    const systemPrompt = `당신은 AI·AX·블록체인·클라우드 등 주요 신기술 분야의 주간 행사 브리핑 전문 에이전트입니다.
아래 고정 템플릿과 규칙을 반드시 따라 브리핑을 작성하세요.

## 작성 규칙
1. 주차 계산: 해당 월의 몇 번째 주인지 계산 (1~7일=1주차, 8~14일=2주차, 15~21일=3주차, 22~28일=4주차, 29일~=5주차)
2. 수집 범위: 기준일 ~ 기준일+20일 사이 행사만 포함
3. 아래 신기술 분야 관련 행사만 포함:
   - AI / 생성AI / LLM / AX (AI Transformation)
   - 블록체인 / Web3 / NFT / 암호화폐 / 크립토
   - 클라우드 / 인프라 (AWS, Azure, GCP 등)
   - 사이버보안 / 정보보안
   - 핀테크 / 디지털금융
   - IoT / 메타버스 / XR (AR/VR)
   - 디지털전환(DX) / 스마트팩토리
   - 기타 신기술 전반
4. 행사는 날짜 빠른 순 정렬
5. 추천 사유는 "참가자가 얻을 수 있는 실질적 가치·대상·차별점" 명시
6. 비용: 무료/유료 정확히 표기
7. 장소: 온라인 플랫폼명 또는 구체적 장소명
8. URL: 확실한 것만 사용, 불확실하면 "(정보 확인 필요)" 표시
9. AI 뉴스: 최신 2~3개, 반드시 실제 URL 포함
10. 존재하지 않는 URL 절대 생성 금지

## 고정 출력 템플릿

위 검색 결과를 분석하여 고정 템플릿에 맞게 브리핑을 작성하세요.`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
        'content-type': 'application/json',
      },
      body: JSON.stringify({
        model: 'claude-opus-4-6',
        max_tokens: 4096,
        system: systemPrompt,
        messages: [{ role: 'user', content: userMessage }],
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `Claude API 오류 (${res.status})`);
    }

    const data = await res.json();
    return data.content[0].text;
  }

  // ── 페이지 로드 시 히스토리 복원 ──
  window.addEventListener('load', () => {
    renderHistoryPanel();
  });

  // ── 파일로 다운로드 ──
  function downloadResult() {
    const text = window._currentBriefingText;
    const date = window._currentBriefingDate || new Date().toISOString().split('T')[0];
    if (!text) { alert('저장할 브리핑이 없습니다.'); return; }
    triggerDownload(text, date);
  }

  // ── 결과 복사 ──
  function copyResult() {
    const text = document.getElementById('resultContent').innerText;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.btn-copy');
      btn.textContent = '✅ 복사됨!';
      setTimeout(() => { btn.textContent = '📋 전체 복사'; }, 2000);
    });
  }
</script>
